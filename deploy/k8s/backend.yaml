apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: medical-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/jerryxst/medical-data-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medical-data-secret
                  key: DATABASE_URL
            - name: API_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: medical-data-config
                  key: API_CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: medical-data
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
