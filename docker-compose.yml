services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_data}
      POSTGRES_USER: ${POSTGRES_USER:-medical_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medical_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medical_user} -d ${POSTGRES_DB:-medical_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medical_user:medical_password@db:5432/medical_data}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
      RAW_FILE_STORAGE: ${RAW_FILE_STORAGE:-/app/uploads/raw}
      AUTH_SECRET: ${AUTH_SECRET:-medical-data-dev-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "3000:80"
    depends_on:
      - backend

  rpa-worker:
    profiles: ["automation"]
    build:
      context: ./apps/rpa-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medical_user:medical_password@db:5432/medical_data}
      RAW_FILE_STORAGE: /app/uploads/raw
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
